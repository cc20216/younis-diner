<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>有米的小馆 - 今天吃什么？</title>
<link rel="stylesheet" href="style.css?v=9">
<link rel="preload" as="image" href="bg-tavern.jpg">
<link rel="preload" as="image" href="youni/19-hatch-cowering.png">
<link rel="preload" as="image" href="youni/20-hatch-standing-shake.png">
<link rel="preload" as="image" href="youni/21-hatch-confident-ready.png">
</head>
<body>
<div id="app-wrapper">
  <div id="soundToggle" class="sound-toggle" title="音效设置">🔊</div>
  <div id="soundPanel" class="sound-panel">
    <div class="sound-panel-row">
      <span class="sound-panel-label">背景音乐</span>
      <div class="sound-panel-btns">
        <button class="sound-panel-btn" id="bgmOnBtn">开</button>
        <button class="sound-panel-btn" id="bgmOffBtn">关</button>
      </div>
    </div>
    <div class="sound-panel-row">
      <span class="sound-panel-label" style="font-size:12px;">BGM音量</span>
      <div class="sound-slider-wrap">
        <input type="range" class="sound-slider" id="bgmSlider" min="0" max="100" value="25">
      </div>
    </div>
    <div class="sound-panel-row">
      <span class="sound-panel-label">音效</span>
      <div class="sound-panel-btns">
        <button class="sound-panel-btn" id="sfxOnBtn">开</button>
        <button class="sound-panel-btn" id="sfxOffBtn">关</button>
      </div>
    </div>
    <div class="sound-panel-row">
      <span class="sound-panel-label" style="font-size:12px;">音效音量</span>
      <div class="sound-slider-wrap">
        <input type="range" class="sound-slider" id="sfxSlider" min="0" max="100" value="60">
      </div>
    </div>
  </div>

<!-- 成就弹窗 -->
<div id="achievementPopup" class="achievement-popup hidden">
  <div class="ach-badge">
    <span class="ach-icon">🏆</span>
    <div class="ach-text">
      <div class="ach-label">成就解锁！</div>
      <div class="ach-name"></div>
      <div class="ach-desc"></div>
    </div>
  </div>
</div>

<!-- ==================== 第一阶段：孵化 ==================== -->
<div id="stage1" class="stage active">
  <div class="opening-overlay" id="openingOverlay">
    <div class="opening-title">有米的小馆</div>
    <div class="opening-subtitle">—— 今天吃什么？ ——</div>
    <div class="opening-stars" id="openingStars">
      <span class="opening-star" style="left:15%;top:55px;">✦</span>
      <span class="opening-star" style="left:75%;top:40px;animation-delay:0.3s;">✧</span>
      <span class="opening-star" style="left:30%;top:80px;animation-delay:0.6s;font-size:10px;">⋆</span>
      <span class="opening-star" style="left:65%;top:75px;animation-delay:0.9s;font-size:10px;">⋆</span>
      <span class="opening-star" style="left:50%;top:50px;animation-delay:1.2s;">✦</span>
    </div>
  </div>
  <div class="egg-container" id="eggContainer">
    <div class="egg" id="egg"></div>
    <div class="egg-crack" id="eggCrack"></div>
    <div class="golden-glow" id="goldenGlow"></div>
    <div class="golden-particles" id="goldenParticles"></div>
    <div class="light-burst-container" id="lightBurst"></div>
  </div>
  <div class="egg-warmth" id="eggWarmth"></div>
  <div class="egg-hint" id="eggHint">点击蛋，唤醒有米</div>
  <div id="hatchedYouni" class="youni-container"></div>
  <div id="stage1Bubble" class="bubble hidden" style="left:160px;top:290px;max-width:200px;"></div>
  <button id="startFirstBtn" class="start-btn hidden" style="position:absolute;bottom:100px;">开始第一次决策</button>
</div>

<!-- ==================== 第二阶段：偏好采集 ==================== -->
<div id="stage2" class="stage">
  <div class="tavern-scene">
    <div class="tavern-bg-texture"></div>
    <div class="warm-vignette"></div>
    <div class="lamp"></div>
    <div class="blackboard">
      <div class="blackboard-title">有米的笔记<span id="editPrefBtn" class="edit-pref-btn hidden" title="修改偏好">✏️</span></div>
      <div id="blackboardContent">辣度：待了解<br>汤类：待了解<br>忌口：无</div>
    </div>
    <div class="bar-counter"></div>
    <div class="prop-chili" id="propChili" style="display:none;">🌶️</div>
    <div class="prop-bowl" id="propBowl" style="display:none;">🍜</div>
  </div>
  <div class="youni-container youni-stage2" id="youniStage2"></div>
  <div id="stage2Bubble" class="bubble" style="left:150px;top:480px;max-width:200px;"></div>
  <div class="question-area" id="questionArea">
    <div class="question-title" id="questionTitle"></div>
    <div id="questionContent"></div>
  </div>
</div>

<!-- ==================== 第三阶段：智能决策 ==================== -->
<div id="stage3" class="stage">
  <div class="tavern-scene">
    <div class="tavern-bg-texture"></div>
    <div class="warm-vignette"></div>
    <div class="lamp"></div>
    <div class="blackboard" style="top:4px;min-height:auto;height:auto;font-size:10px;padding:6px 10px;width:auto;min-width:60px;right:8px;left:auto;">
      <div class="blackboard-title" style="font-size:9px;margin-bottom:2px;">今日运势</div>
      <div id="weatherBoard" style="font-size:14px;">晴</div>
      <div id="sceneLabel" style="font-size:8px;color:#E8D5B8;margin-top:1px;">午餐时刻</div>
    </div>
    <div class="bar-counter"></div>
  </div>
  <div class="youni-container youni-stage3" id="youniStage3"></div>
  <div id="stage3Bubble" class="bubble" style="left:130px;top:500px;max-width:200px;"></div>
  <div class="wheel-area" id="wheelArea" style="display:none;">
    <canvas id="wheelCanvas" width="280" height="280"></canvas>
    <div class="wheel-pointer" id="wheelPointer">
      <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="ps" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
          </filter>
        </defs>
        <polygon points="14,22 6,4 22,4" fill="#F5A623" stroke="#8B4513" stroke-width="1.5" filter="url(#ps)"/>
        <polygon points="14,18 9,6 19,6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      </svg>
    </div>
    <div class="wheel-pulse" id="wheelPulse"></div>
    <div class="wheel-tooltip" id="wheelTooltip"></div>
    <div id="wheelCounter" style="color:#F5A623;font-size:12px;margin-bottom:6px;text-align:center;">5/12</div>
    <div id="wheelBtnArea" style="text-align:center;margin-top:4px;">
      <div style="display:flex;justify-content:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;">
        <button class="wheel-action-btn" id="spinBtn">转动转盘</button>
        <button class="wheel-action-btn" id="addMoreBtn">加一批</button>
      </div>
      <div style="display:flex;justify-content:center;gap:6px;flex-wrap:nowrap;">
        <button class="wheel-action-btn" id="reshuffleBtn" style="padding:8px 16px;">换一换</button>
        <button class="wheel-action-btn" id="customPickBtn" style="padding:8px 16px;">我想自己选</button>
        <button class="wheel-action-btn" id="editPrefStage3Btn" style="padding:8px 14px;font-size:12px;opacity:0.85;">✏️ 修改偏好</button>
      </div>
    </div>
  </div>
  <div class="input-area" id="inputArea" style="display:none;">
    <input type="text" class="options-input" id="optionsInput" placeholder="输入选项，如：麻辣烫、寿司、沙拉">
    <button class="spin-btn" id="analyzeBtn">让有米分析</button>
    <div style="margin-top:12px;">
      <button class="skip-btn" id="backToRecommendBtn">← 回到有米推荐</button>
    </div>
  </div>
  <div class="analyzing-overlay" id="analyzingOverlay">
    <div class="think-bubble"></div>
    <div class="think-text" id="thinkText">有米在看黑板...</div>
  </div>
  <div class="receipt-overlay" id="receiptOverlay">
    <div class="receipt">
      <button class="receipt-close" id="receiptClose">&times;</button>
      <div class="receipt-title">有米的小馆 - 今日推荐</div>
      <div class="receipt-result" id="receiptResult"></div>
      <div style="text-align:center;font-size:13px;color:#5C3A1E;" id="receiptDate"></div>
      <div class="receipt-note" id="receiptNote"></div>
      <button class="receipt-save-btn" id="receiptSaveBtn">保存小纸条</button>
    </div>
  </div>
</div>

<!-- ==================== 第四阶段：反馈 ==================== -->
<div id="stage4" class="stage">
  <div class="tavern-scene">
    <div class="tavern-bg-texture"></div>
    <div class="warm-vignette"></div>
    <div class="lamp"></div>
    <div class="bar-counter"></div>
  </div>
  <div class="youni-container youni-stage4" id="youniStage4"></div>
  <div id="stage4Bubble" class="bubble" style="left:130px;top:500px;max-width:200px;"></div>
  <div class="feedback-area" id="feedbackArea">
    <div class="feedback-title" id="feedbackTitle">这顿吃得怎么样？</div>
    <div class="feedback-btns" id="feedbackBtns">
      <button class="feedback-btn good" data-rating="good">&#128523;</button>
      <button class="feedback-btn ok" data-rating="ok">&#128528;</button>
      <button class="feedback-btn bad" data-rating="bad">&#128555;</button>
    </div>
    <button class="skip-feedback-link" id="skipFeedbackBtn">跳过</button>
    <div class="attribution-box" id="attributionBox">
      <p>有米想知道是哪里出了问题...</p>
      <div class="attribution-options">
        <span class="att-tag" data-reason="too_spicy">太辣了</span>
        <span class="att-tag" data-reason="too_bland">太淡</span>
        <span class="att-tag" data-reason="bad_quality">食材不新鲜</span>
        <span class="att-tag" data-reason="too_slow">等太久</span>
        <span class="att-tag" data-reason="not_tasty">不合口味</span>
        <span class="att-tag" data-reason="other">其他</span>
      </div>
      <button class="return-btn" id="confirmBadBtn" style="margin-top:16px;">记下了</button>
    </div>
    <button class="return-btn hidden" id="goToBookBtn">查看图鉴</button>
  </div>
</div>

<!-- ==================== 第五阶段：图鉴 ==================== -->
<div id="stage5" class="stage">
  <div class="tavern-scene">
    <div class="tavern-bg-texture"></div>
    <div class="warm-vignette"></div>
    <div class="lamp"></div>
    <div class="bar-counter"></div>
  </div>
  <div class="youni-container youni-stage5" id="youniStage5"></div>
  <div id="stage5Bubble" class="bubble" style="left:125px;bottom:50px;max-width:200px;"></div>
  <div class="book-func-bar" style="position:absolute;top:35px;left:295px;display:flex;flex-direction:column;gap:10px;">
    <button class="func-icon-btn" id="statsBtn" title="饮食统计">📊</button>
    <button class="func-icon-btn" id="calendarBtn" title="食材日历">📅</button>
    <button class="func-icon-btn" id="dressUpBtn" title="有米装扮">🎨</button>
  </div>
  <div class="book-container" id="bookContainer">
    <div class="book" id="bookContent">
      <div class="book-spine"></div>
      <div id="bookPage">
        <div class="silhouette">
          <div class="silhouette-icon">&#128214;</div>
          <div class="silhouette-text">还没有解锁任何记录哦~<br>快去让有米帮你决策吧！</div>
        </div>
      </div>
      <div class="book-nav" id="bookNav" style="display:none;">
        <button id="prevPage">上一页</button>
        <button id="nextPage">下一页</button>
      </div>
    </div>
  </div>
  <div class="bottom-menu">
    <button class="menu-btn" id="backToWheelBtn">再转一次</button>
    <button class="menu-btn" id="resetBtn">重新开始</button>
  </div>
</div>

</div><!-- /app-wrapper -->

<script src="app.js?v=6"></script>
</body>
</html>
